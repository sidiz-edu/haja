<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Left content -->
  <text x="80" y="200" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="20" fill="#64748b" letter-spacing="3">SIDIZ · 옴니채널성장팀</text>
  <text x="80" y="290" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="64" font-weight="700" fill="#f1f5f9">하자보수비</text>
  <text x="80" y="365" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="64" font-weight="700" fill="#f1f5f9">분석 대시보드</text>

  <!-- Accent underline -->
  <rect x="80" y="390" width="180" height="4" rx="2" fill="url(#accent)"/>

  <!-- Description -->
  <text x="80" y="450" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="24" fill="#94a3b8">AS 접수 · 유형분석 · 처리현황 · 품질이슈</text>

  <!-- Right side - mini bar chart -->
  <g transform="translate(720, 120)">
    <!-- Chart background card -->
    <rect x="0" y="0" width="400" height="380" rx="16" fill="#1e293b" opacity="0.8"/>
    <rect x="0" y="0" width="400" height="380" rx="16" fill="none" stroke="#334155" stroke-width="1"/>

    <text x="24" y="40" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="16" fill="#94a3b8">유형별 접수 현황</text>

    <!-- Bars -->
    <!-- Bar A -->
    <rect x="40" y="200" width="48" height="120" rx="6" fill="url(#bar1)"/>
    <text x="64" y="340" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">A유형</text>
    <text x="64" y="192" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle" font-weight="600">38%</text>

    <!-- Bar B -->
    <rect x="116" y="240" width="48" height="80" rx="6" fill="url(#bar2)"/>
    <text x="140" y="340" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">B유형</text>
    <text x="140" y="232" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="600">24%</text>

    <!-- Bar C -->
    <rect x="192" y="260" width="48" height="60" rx="6" fill="url(#bar3)"/>
    <text x="216" y="340" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">C유형</text>
    <text x="216" y="252" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle" font-weight="600">18%</text>

    <!-- Bar D -->
    <rect x="268" y="280" width="48" height="40" rx="6" fill="#6366f1" opacity="0.9"/>
    <text x="292" y="340" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">D유형</text>
    <text x="292" y="272" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14" fill="#818cf8" text-anchor="middle" font-weight="600">12%</text>

    <!-- Bar E -->
    <rect x="344" y="295" width="48" height="25" rx="6" fill="#ec4899" opacity="0.9"/>
    <text x="368" y="340" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">E유형</text>
    <text x="368" y="287" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="14" fill="#f472b6" text-anchor="middle" font-weight="600">8%</text>

    <!-- Bottom line -->
    <line x1="24" y1="322" x2="376" y2="322" stroke="#334155" stroke-width="1"/>

    <!-- Stats row -->
    <rect x="24" y="355" width="100" height="1" fill="none"/>
    <text x="24" y="372" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">총 접수</text>
    <text x="200" y="372" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#475569">처리완료</text>
  </g>

  <!-- Bottom powered by -->
  <text x="80" y="580" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="16" fill="#475569">Powered by Supabase · 실시간 데이터 연동</text>
</svg>
