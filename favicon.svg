<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 배경 -->
  <rect width="32" height="32" rx="7" fill="#003EFF"/>
  <!-- 돋보기 렌즈 -->
  <circle cx="13" cy="13" r="7.5" fill="rgba(255,255,255,0.12)" stroke="white" stroke-width="2.2"/>
  <!-- 렌즈 안 막대 차트 (프로세스 데이터) -->
  <rect x="9"  y="13" width="2" height="4" rx="0.6" fill="white"/>
  <rect x="12" y="10" width="2" height="7" rx="0.6" fill="white"/>
  <rect x="15" y="11" width="2" height="6" rx="0.6" fill="white"/>
  <!-- 돋보기 손잡이 -->
  <line x1="19" y1="19" x2="26" y2="26" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
</svg>
